<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#183f31" />
    <title>Despensapp sin conexion</title>
    <style>
      :root {
        color: #18231e;
        background: #f4f7f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
        line-height: 1;
      }

      p {
        margin: 0;
        color: #51645b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Despensapp</h1>
      <p>No hay conexion y la app aun no esta disponible en cache. Abrela una vez con conexion para usarla offline.</p>
    </main>
  </body>
</html>
